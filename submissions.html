<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#123B2E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PMR">
<meta name="mobile-web-app-capable" content="yes">
<title>Submissions &middot; Pavan Midway Residency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12211C; --deep:#123B2E; --deep-2:#0C2A21; --brass:#C08A3E;
  --paper:#F2EFE6; --paper-2:#E7E2D4; --card:#FBFAF5;
  --line:#CFC8B5; --muted:#6C7A72; --danger:#8E2B22; --ok:#2F6D4F; --warn:#B07A20;
  --radius:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--deep);color:var(--ink);
  font-family:Inter,system-ui,-apple-system,Roboto,sans-serif;
  display:flex;justify-content:center}
.vp{width:100%;max-width:430px;background:var(--paper);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

.top{background:var(--deep);color:var(--paper);padding:16px 20px 18px;position:sticky;top:0;z-index:40}
.top::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;
  background:linear-gradient(90deg,var(--brass) 0 22%,transparent 22%)}
.trow{display:flex;align-items:center;gap:12px}
.back{background:rgba(242,239,230,.09);border:1px solid rgba(242,239,230,.16);
  color:var(--paper);border-radius:10px;padding:9px;cursor:pointer;display:grid;place-items:center}
.top h1{font-family:Fraunces,Georgia,serif;font-weight:600;font-size:19px;margin:0;flex:1}

.tabs{display:flex;gap:7px;padding:14px 20px 0}
.tab{flex:1;font-family:"Roboto Mono",monospace;font-size:10px;letter-spacing:.08em;
  text-transform:uppercase;padding:10px 6px;border-radius:10px;border:1px solid var(--line);
  background:var(--card);color:var(--muted);cursor:pointer;text-align:center}
.tab.on{background:var(--deep);color:var(--paper);border-color:var(--deep)}
.tab b{display:block;font-family:Fraunces,serif;font-size:15px;margin-bottom:2px}

.scroll{flex:1;overflow-y:auto;padding:16px 20px 40px}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;margin-bottom:12px}
.card.upd{border-left:3px solid var(--warn)}
.chead{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.fno{width:52px;flex-shrink:0;background:var(--deep);color:var(--paper);
  border-radius:10px;padding:8px 4px;text-align:center}
.fno .n{font-family:Fraunces,serif;font-weight:600;font-size:15px;line-height:1}
.fno .b{font-family:"Roboto Mono",monospace;font-size:8px;letter-spacing:.1em;
  color:var(--brass);margin-top:3px}
.cmain{flex:1;min-width:0}
.cmain .nm{font-size:15px;font-weight:600;margin-bottom:2px}
.cmain .mo{font-family:"Roboto Mono",monospace;font-size:11.5px;color:var(--muted)}
.pill{font-family:"Roboto Mono",monospace;font-size:8.5px;letter-spacing:.1em;
  text-transform:uppercase;padding:4px 8px;border-radius:20px;white-space:nowrap}
.pill.owner{background:#E4F0E9;color:var(--ok)}
.pill.rented{background:#F6EBD8;color:var(--warn)}
.pill.vacant{background:var(--paper-2);color:var(--muted)}

.kv{display:flex;justify-content:space-between;gap:12px;padding:8px 0;
  border-bottom:1px solid var(--paper-2);font-size:13px}
.kv:last-child{border-bottom:0}
.kv .k{color:var(--muted);flex-shrink:0}
.kv .v{font-weight:500;text-align:right;word-break:break-word}
.det{margin-top:10px;padding-top:4px;border-top:1px solid var(--paper-2)}

.flag{display:inline-flex;align-items:center;gap:6px;background:#FCF6E9;color:var(--warn);
  border:1px solid #EBD9B4;border-radius:8px;padding:7px 10px;font-size:11.5px;
  margin-bottom:11px;line-height:1.4}

.acts{display:flex;gap:9px;margin-top:14px}
.acts button{flex:1;padding:12px;border-radius:11px;font-family:inherit;
  font-size:13.5px;font-weight:600;cursor:pointer;border:0}
.ok{background:var(--deep);color:var(--paper)}
.no{background:var(--card);color:var(--danger);border:1.5px solid #E9CEC9}
.acts button:disabled{opacity:.5}

.meta{font-family:"Roboto Mono",monospace;font-size:9.5px;color:var(--muted);
  letter-spacing:.05em;margin-top:11px;padding-top:10px;border-top:1px solid var(--paper-2)}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty svg{opacity:.3;margin-bottom:14px}
.empty p{margin:0;font-size:14px;line-height:1.6}
.load{padding:60px;text-align:center;color:var(--muted)}
.sp{width:22px;height:22px;border:2.5px solid var(--paper-2);border-top-color:var(--deep);
  border-radius:50%;animation:s .7s linear infinite;margin:0 auto 14px}
@keyframes s{to{transform:rotate(360deg)}}
.err{background:#F7E8E5;border:1px solid #E9CEC9;color:var(--danger);
  padding:14px;border-radius:11px;font-size:13.5px;line-height:1.5}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(90px);
  background:var(--deep);color:var(--paper);padding:13px 20px;border-radius:11px;
  font-size:13.5px;z-index:90;transition:transform .25s;max-width:340px;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important}}
</style>
</head>
<body>
<div class="vp">
  <header class="top">
    <div class="trow">
      <button class="back" id="back" aria-label="Back">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h1>Submissions</h1>
    <span id="bell"></span>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab on" data-s="pending"><b id="cP">0</b>Pending</button>
    <button class="tab" data-s="approved"><b id="cA">0</b>Approved</button>
    <button class="tab" data-s="rejected"><b id="cR">0</b>Rejected</button>
  </div>

  <div class="scroll" id="scroll">
    <div class="load" id="load"><div class="sp"></div>Loading&hellip;</div>
    <div id="list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var API="api/", KEY="pmr_token";
  var token=null;
  try{ token=localStorage.getItem(KEY)||sessionStorage.getItem(KEY); }catch(e){}
  if(!token){ location.replace("index.html"); return; }

  var state="pending";
  var $=function(i){return document.getElementById(i);};

  function api(path,opts){
    opts=opts||{}; opts.headers=opts.headers||{};
    opts.headers["Authorization"]="Bearer "+token;
    var url=API+path+(path.indexOf("?")===-1?"?":"&")+"token="+encodeURIComponent(token);
    return fetch(url,opts).then(function(r){
      if(r.status===401){
        try{localStorage.removeItem(KEY);sessionStorage.removeItem(KEY);}catch(e){}
        location.replace("index.html"); throw new Error("unauthorised");
      }
      return r.text().then(function(t){
        if(!t||!t.trim()) throw new Error(path+" returned an empty response (HTTP "+r.status+").");
        try{ return JSON.parse(t); }
        catch(e){ throw new Error(path+" did not return JSON. Server said: "+
          t.replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim().slice(0,200)); }
      });
    });
  }

  function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

  function when(ts){
    if(!ts) return "";
    var d=new Date(ts.replace(" ","T"));
    if(isNaN(d)) return ts;
    return d.toLocaleDateString("en-IN",{day:"numeric",month:"short"})+" "+
           d.toLocaleTimeString("en-IN",{hour:"numeric",minute:"2-digit"});
  }

  function money(n){
    if(n==null) return null;
    return "\u20B9" + Number(n).toLocaleString("en-IN");
  }

  function toast(m){
    var t=$("toast"); t.textContent=m; t.classList.add("show");
    setTimeout(function(){t.classList.remove("show");},2600);
  }

  function load(){
    $("load").style.display="";
    $("list").innerHTML="";
    api("submissions.php?state="+state)
      .then(function(d){
        if(!d.ok) throw new Error(d.error||"Could not load submissions.");
        $("cP").textContent=d.counts.pending||0;
        $("cA").textContent=d.counts.approved||0;
        $("cR").textContent=d.counts.rejected||0;
        $("load").style.display="none";
        render(d.submissions);
      })
      .catch(function(e){
        if(e.message==="unauthorised") return;
        $("load").innerHTML='<div class="err">'+esc(e.message)+'</div>';
      });
  }

  function render(rows){
    if(!rows.length){
      $("list").innerHTML=
        '<div class="empty">'+
        '<svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#12211C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>'+
        '<p>No '+state+' submissions yet.<br>Share the resident form link to start collecting details.</p></div>';
      return;
    }

    var h="";
    rows.forEach(function(s){
      h+='<div class="card'+(s.is_update&&s.review_state==="pending"?" upd":"")+'" data-id="'+s.id+'">';

      if(s.is_update && s.review_state==="pending"){
        h+='<div class="flag">'+
           '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 9v4"/><path d="M12 17v.01"/><circle cx="12" cy="12" r="9"/></svg>'+
           'This flat already has details. Approving will replace them.</div>';
      }

      h+='<div class="chead">';
      h+=  '<div class="fno"><div class="n">'+esc(s.flat_no)+'</div><div class="b">'+esc(s.block_name.replace("Block ",""))+'</div></div>';
      h+=  '<div class="cmain"><div class="nm">'+esc(s.owner_name)+'</div>'+
           '<div class="mo">'+esc(s.owner_mobile)+(s.owner_mobile_alt?" / "+esc(s.owner_mobile_alt):"")+'</div></div>';
      h+=  '<span class="pill '+esc(s.status)+'">'+
           (s.status==="owner"?"Owner":s.status==="rented"?"Rented":"Vacant")+'</span>';
      h+='</div>';

      h+='<div class="det">';
      if(s.owner_email) h+=kv("Email",esc(s.owner_email));
      if(s.vehicles.length){
        h+=kv("Vehicles", s.vehicles.map(function(v){
          return esc(v.number) + (v.label ? ' <span style="color:#6C7A72;font-weight:400">('+esc(v.label)+')</span>' : '');
        }).join("<br>"));
      }

      if(s.status==="owner"){
        if(s.family_members) h+=kv("People staying",s.family_members);
      }
      else if(s.status==="rented"){
        h+=kv("Tenant",esc(s.tenant_name));
        h+=kv("Tenant mobile",esc(s.tenant_mobile)+(s.tenant_mobile_alt?" / "+esc(s.tenant_mobile_alt):""));
        if(s.tenant_family) h+=kv("People staying",s.tenant_family);
        if(s.rent_amount)   h+=kv("Monthly rent",money(s.rent_amount));
        if(s.lease_start)   h+=kv("Lease",esc(s.lease_start)+(s.lease_end?" to "+esc(s.lease_end):""));
      }
      else{
        if(s.vacant_since) h+=kv("Vacant since",esc(s.vacant_since));
        h+=kv("Looking to rent", s.looking_to_rent?"Yes":"No");
        if(s.expected_rent) h+=kv("Expected rent",money(s.expected_rent));
      }
      if(s.notes) h+=kv("Notes",esc(s.notes));
      h+='</div>';

      if(s.review_state==="pending"){
        h+='<div class="acts">'+
           '<button class="no" data-a="reject" data-id="'+s.id+'">Reject</button>'+
           '<button class="ok" data-a="approve" data-id="'+s.id+'">Approve</button></div>';
      }

      h+='<div class="meta">Submitted '+esc(when(s.created_at));
      if(s.reviewed_at) h+=' \u00B7 '+esc(s.review_state)+' by '+esc(s.reviewer_name||"")+' '+esc(when(s.reviewed_at));
      h+='</div>';

      h+='</div>';
    });
    $("list").innerHTML=h;
  }

  function kv(k,v){
    return '<div class="kv"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>';
  }

  /* actions */
  $("list").addEventListener("click",function(e){
    var b=e.target.closest("button[data-a]");
    if(!b) return;
    var id=b.getAttribute("data-id"), act=b.getAttribute("data-a");

    if(act==="reject" && !confirm("Reject this submission?")) return;

    var card=b.closest(".card");
    card.querySelectorAll("button").forEach(function(x){x.disabled=true;});

    api("submissions.php",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id:parseInt(id,10),action:act})
    })
    .then(function(d){
      if(!d.ok){
        toast(d.error||"Could not complete that.");
        card.querySelectorAll("button").forEach(function(x){x.disabled=false;});
        return;
      }
      toast(act==="approve"?"Approved and published.":"Submission rejected.");
      load();
    })
    .catch(function(err){
      if(err.message==="unauthorised") return;
      toast(err.message||"Something went wrong.");
      card.querySelectorAll("button").forEach(function(x){x.disabled=false;});
    });
  });

  $("tabs").addEventListener("click",function(e){
    var t=e.target.closest(".tab");
    if(!t) return;
    this.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});
    t.classList.add("on");
    state=t.getAttribute("data-s");
    load();
  });

  $("back").addEventListener("click",function(){ location.href="dashboard.html"; });

  load();
})();
</script>
<script src="assets/notify.js"></script>
<script src="assets/pwa.js"></script>
</body>
</html>
