<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#123B2E">
<title>Logins &middot; Pavan Midway Residency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#12211C;--deep:#123B2E;--deep-2:#0C2A21;--brass:#C08A3E;--paper:#F2EFE6;
--paper-2:#E7E2D4;--card:#FBFAF5;--line:#CFC8B5;--muted:#6C7A72;--danger:#8E2B22;
--ok:#2F6D4F;--warn:#B07A20;--radius:14px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--deep);color:var(--ink);font-family:Inter,system-ui,Roboto,sans-serif;
display:flex;justify-content:center}
.vp{width:100%;max-width:430px;background:var(--paper);min-height:100vh;min-height:100dvh;
display:flex;flex-direction:column}
.top{background:var(--deep);color:var(--paper);padding:16px 20px 0;position:sticky;top:0;z-index:40}
.trow{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back{background:rgba(242,239,230,.09);border:1px solid rgba(242,239,230,.16);color:var(--paper);
border-radius:10px;padding:9px;cursor:pointer;display:grid;place-items:center}
.top h1{font-family:Fraunces,Georgia,serif;font-weight:600;font-size:19px;margin:0;flex:1}
.tabs{display:flex}
.tb{flex:1;background:none;border:0;border-bottom:2.5px solid transparent;color:rgba(242,239,230,.5);
font-family:"Roboto Mono",monospace;font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;
padding:11px 4px;cursor:pointer}
.tb.on{color:var(--paper);border-bottom-color:var(--brass)}
.tb b{display:block;font-family:Fraunces,serif;font-size:15px;margin-bottom:3px}
.scroll{flex:1;overflow-y:auto;padding:18px 20px 40px}
.hero{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
padding:17px;margin-bottom:16px}
.hero .big{font-family:Fraunces,serif;font-weight:600;font-size:32px;color:var(--deep);line-height:1}
.hero .big small{font-size:15px;color:var(--muted);font-weight:500}
.hero .lab{font-family:"Roboto Mono",monospace;font-size:9.5px;letter-spacing:.13em;
text-transform:uppercase;color:var(--muted);margin-top:7px}
.bar{height:8px;border-radius:4px;background:var(--paper-2);overflow:hidden;margin-top:13px}
.bar i{display:block;height:100%;background:var(--deep)}
.mkall{width:100%;padding:15px;background:var(--brass);color:var(--deep-2);border:0;
border-radius:12px;font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;margin-bottom:16px}
.mkall[disabled]{opacity:.5}
.row{background:var(--card);border:1px solid var(--line);border-radius:12px;
padding:13px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.fno{width:46px;flex-shrink:0;background:var(--deep);color:var(--paper);border-radius:9px;
padding:7px 3px;text-align:center;font-family:Fraunces,serif;font-weight:600;font-size:13px}
.rm{flex:1;min-width:0}
.rm .n{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rm .u{font-family:"Roboto Mono",monospace;font-size:10.5px;color:var(--muted);margin-top:2px}
.act{background:var(--deep);color:var(--paper);border:0;border-radius:9px;padding:9px 13px;
font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
.act.ghost{background:var(--card);color:var(--muted);border:1px solid var(--line)}
.act.warn{background:var(--card);color:var(--danger);border:1px solid #E9CEC9}
.tagline{font-family:"Roboto Mono",monospace;font-size:8.5px;letter-spacing:.1em;
text-transform:uppercase;padding:3px 7px;border-radius:20px;background:var(--paper-2);
color:var(--muted);display:inline-block;margin-top:4px}
.tagline.new{background:#F6EBD8;color:var(--warn)}
.tagline.off{background:#F7E8E5;color:var(--danger)}
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty p{margin:0;font-size:13.5px;line-height:1.6}
.load{padding:60px;text-align:center;color:var(--muted)}
.sp{width:22px;height:22px;border:2.5px solid var(--paper-2);border-top-color:var(--deep);
border-radius:50%;animation:s .7s linear infinite;margin:0 auto 14px}
@keyframes s{to{transform:rotate(360deg)}}
.err{background:#F7E8E5;border:1px solid #E9CEC9;color:var(--danger);padding:14px;
border-radius:11px;font-size:13.5px}
.veil{position:fixed;inset:0;background:rgba(12,42,33,.55);display:none;align-items:flex-end;
justify-content:center;z-index:70}
.veil.show{display:flex}
.sheet{width:100%;max-width:430px;background:var(--paper);border-radius:20px 20px 0 0;
padding:8px 22px 30px;animation:up .22s cubic-bezier(.2,.8,.3,1);max-height:92vh;overflow-y:auto}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.grab{width:36px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 18px}
.sheet h3{font-family:Fraunces,serif;font-weight:600;font-size:22px;margin:0 0 5px;color:var(--deep)}
.sheet .sh-sub{font-size:13px;color:var(--muted);margin:0 0 18px;line-height:1.5}
.cred{background:var(--deep);color:var(--paper);border-radius:13px;padding:18px;margin-bottom:14px}
.cred .cl{font-family:"Roboto Mono",monospace;font-size:9px;letter-spacing:.14em;
text-transform:uppercase;color:var(--brass);margin-bottom:5px}
.cred .cv{font-family:"Roboto Mono",monospace;font-size:19px;letter-spacing:.06em;margin-bottom:14px}
.cred .cv:last-child{margin-bottom:0}
.go{width:100%;padding:14px;background:var(--deep);color:var(--paper);border:0;border-radius:12px;
font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;margin-top:4px}
.copy{width:100%;padding:14px;background:var(--brass);color:var(--deep-2);border:0;
border-radius:12px;font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;margin-bottom:9px}
.f{margin-bottom:14px}
label{display:block;font-size:13px;font-weight:500;margin:0 0 6px}
input{width:100%;font-family:inherit;font-size:16px;padding:13px;border:1.5px solid var(--line);
border-radius:12px;background:var(--card)}
input:focus{outline:none;border-color:var(--deep);box-shadow:0 0 0 3.5px rgba(18,59,46,.11)}
.list-cred{max-height:280px;overflow-y:auto;background:var(--card);border:1px solid var(--line);
border-radius:12px;padding:12px;margin-bottom:14px;font-family:"Roboto Mono",monospace;
font-size:11.5px;line-height:1.9}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(90px);
background:var(--deep);color:var(--paper);padding:13px 20px;border-radius:11px;font-size:13.5px;
z-index:95;transition:transform .25s;max-width:340px;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important}}
</style>
</head>
<body>
<div class="vp">
  <header class="top">
    <div class="trow">
      <button class="back" id="back" aria-label="Back">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h1>Logins</h1>
    <span id="bell"></span>
    </div>
    <div class="tabs" id="tabs">
      <button class="tb on" data-v="need"><b id="cNeed">0</b>Needs login</button>
      <button class="tb" data-v="have"><b id="cHave">0</b>Has login</button>
      <button class="tb" data-v="gate"><b id="cGate">0</b>Gate</button>
    </div>
  </header>
  <div class="scroll">
    <div class="load" id="load"><div class="sp"></div>Loading&hellip;</div>
    <div id="main" hidden></div>
  </div>
</div>

<div class="veil" id="veil">
  <div class="sheet">
    <div class="grab"></div>
    <div id="shBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var API="api/", KEY="pmr_token";
  var token=null;
  try{ token=localStorage.getItem(KEY)||sessionStorage.getItem(KEY); }catch(e){}
  if(!token){ location.replace("index.html"); return; }

  var $=function(i){return document.getElementById(i);};
  var veil=$("veil"), view="need", data=null;

  function api(path,opts){
    opts=opts||{}; opts.headers=opts.headers||{};
    opts.headers["Authorization"]="Bearer "+token;
    var url=API+path+(path.indexOf("?")===-1?"?":"&")+"token="+encodeURIComponent(token);
    return fetch(url,opts).then(function(r){
      if(r.status===401){
        try{localStorage.removeItem(KEY);sessionStorage.removeItem(KEY);}catch(e){}
        location.replace("index.html"); throw new Error("unauthorised");
      }
      return r.text().then(function(t){
        if(!t||!t.trim()) throw new Error("Empty response (HTTP "+r.status+").");
        try{ return JSON.parse(t); }
        catch(e){ throw new Error("Server said: "+t.replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim().slice(0,180)); }
      });
    });
  }
  function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
  function toast(m){ var t=$("toast"); t.textContent=m; t.classList.add("show");
    setTimeout(function(){t.classList.remove("show");},2600); }

  function load(){
    api("accounts.php").then(function(d){
      if(!d.ok) throw new Error(d.error||"Could not load.");
      data=d;
      var need=d.flats.filter(function(f){return f.has_details && !f.user_id;}).length;
      $("cNeed").textContent=need;
      $("cHave").textContent=d.stats.with_account;
      $("cGate").textContent=d.guards.length;
      $("load").hidden=true; $("main").hidden=false;
      render();
    }).catch(function(e){
      if(e.message==="unauthorised") return;
      $("load").innerHTML='<div class="err">'+esc(e.message)+'</div>';
    });
  }

  function render(){
    var h="";

    if(view==="gate"){
      var gateUrl = location.href.replace(/accounts\.html.*$/, "") + "gate.html";
      h+='<div style="background:#FBFAF5;border:1px solid #CFC8B5;border-radius:14px;padding:18px;margin-bottom:14px">';
      h+=  '<div style="font-family:\'Roboto Mono\',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#123B2E;margin-bottom:12px">Gate page</div>';
      h+=  '<div id="qrBox" style="width:190px;height:190px;margin:0 auto 16px;background:#fff;border-radius:11px;padding:9px;display:grid;place-items:center"></div>';
      h+=  '<div style="background:#E7E2D4;border-radius:10px;padding:11px;font-family:\'Roboto Mono\',monospace;font-size:11px;word-break:break-all;line-height:1.55;color:#12211C;margin-bottom:13px">'+esc(gateUrl)+'</div>';
      h+=  '<p style="font-size:12.5px;color:#6C7A72;line-height:1.55;margin:0 0 13px">Print this code and put it at the gate. Security staff scan it to open the visitor screen. No login is needed.</p>';
      h+=  '<button class="act" id="cpGate" style="width:100%;padding:13px;background:#123B2E;color:#F2EFE6;border:0;border-radius:11px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer">Copy link</button>';
      h+=  '<button class="act ghost" id="openGate" style="width:100%;margin-top:8px;padding:13px;background:none;border:1px solid #CFC8B5;color:#123B2E;border-radius:11px;font-family:inherit;font-size:14px;cursor:pointer">Open the gate page</button>';
      h+='</div>';
      h+='<div style="background:#FCF6E9;border:1px solid #EBD9B4;border-radius:12px;padding:13px;font-size:12.5px;color:#B07A20;line-height:1.55">Anyone with this link can log a visitor for any flat. Keep the printed code at the gate only.</div>';
      $("main").innerHTML=h;
      drawQr(gateUrl);
      $("cpGate").addEventListener("click",function(){
        var self=this;
        function done(){ self.textContent="Copied"; setTimeout(function(){ self.textContent="Copy link"; },1800); }
        if(navigator.clipboard&&navigator.clipboard.writeText){
          navigator.clipboard.writeText(gateUrl).then(done).catch(fb);
        } else { fb(); }
        function fb(){
          var ta=document.createElement("textarea"); ta.value=gateUrl;
          ta.style.position="fixed"; ta.style.opacity="0";
          document.body.appendChild(ta); ta.select();
          try{ document.execCommand("copy"); done(); }catch(e){}
          document.body.removeChild(ta);
        }
      });
      $("openGate").addEventListener("click",function(){ window.open(gateUrl,"_blank"); });
      return;
    }

    if(view==="need"){
      var need=data.flats.filter(function(f){return f.has_details && !f.user_id;});
      var noDet=data.flats.filter(function(f){return !f.has_details;}).length;

      var pct=data.stats.total? Math.round(data.stats.with_account/data.stats.total*100):0;
      h+='<div class="hero"><div class="big">'+data.stats.with_account+'<small> / '+data.stats.total+'</small></div>'+
         '<div class="lab">flats have a login</div>'+
         '<div class="bar"><i style="width:'+pct+'%"></i></div></div>';

      if(need.length){
        h+='<button class="mkall" id="mkAll">Create logins for all '+need.length+' ready flats</button>';
      }

      if(!need.length){
        h+='<div class="empty"><p>'+(noDet?
           "Every flat with collected details already has a login.<br>"+noDet+" flats still need their details.":
           "All flats have logins.")+'</p></div>';
      } else {
        need.forEach(function(f){
          h+='<div class="row"><div class="fno">'+esc(f.flat_no)+'</div>'+
             '<div class="rm"><div class="n">'+esc(f.resident_name||"")+'</div>'+
             '<div class="u">'+esc(f.flat_code)+'</div></div>'+
             '<button class="act" data-make="'+f.flat_id+'">Create</button></div>';
        });
      }
      $("main").innerHTML=h; wire(); return;
    }

    var have=data.flats.filter(function(f){return f.user_id;});
    if(!have.length){
      h+='<div class="empty"><p>No resident logins created yet.</p></div>';
    } else {
      have.forEach(function(f){
        h+='<div class="row"><div class="fno">'+esc(f.flat_no)+'</div>'+
           '<div class="rm"><div class="n">'+esc(f.account_name||"")+'</div>'+
           '<div class="u">'+esc(f.username)+'</div>'+
           (f.temp_password?'<span class="tagline new">Not logged in yet</span>':
            (f.account_status==="suspended"?'<span class="tagline off">Disabled</span>':''))+'</div>'+
           '<button class="act ghost" data-reset="'+f.user_id+'">Reset</button></div>';
      });
    }
    $("main").innerHTML=h; wire();
  }

  function wire(){
    var ma=$("mkAll");
    if(ma) ma.addEventListener("click",function(){
      if(!confirm("Create logins for every flat that has details?")) return;
      this.disabled=true;
      api("accounts.php",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"create_all"})})
      .then(function(r){
        if(!r.ok){ toast(r.error); if(ma) ma.disabled=false; return; }
        showBulk(r.accounts);
        load();
      }).catch(function(e){ toast(e.message); if(ma) ma.disabled=false; });
    });

    var mg=$("mkGuard");
    if(mg) mg.addEventListener("click",function(){
      $("shBody").innerHTML='<h3>New gate login</h3>'+
        '<p class="sh-sub">For the security desk at the main gate.</p>'+
        '<div class="f"><label for="gname">Name</label><input type="text" id="gname" placeholder="Main gate"></div>'+
        '<button class="go" id="gMake">Create login</button>';
      veil.classList.add("show");
      $("gMake").addEventListener("click",function(){
        var n=$("gname").value.trim();
        if(n.length<2){ toast("Please enter a name."); return; }
        this.disabled=true;
        api("accounts.php",{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"create_guard",name:n})})
        .then(function(r){
          if(!r.ok){ toast(r.error); return; }
          showCred("Gate login created", r.name, r.username, r.password);
          load();
        }).catch(function(e){ toast(e.message); });
      });
    });

    document.querySelectorAll("[data-make]").forEach(function(b){
      b.addEventListener("click",function(){
        this.disabled=true;
        api("accounts.php",{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"create",flat_id:parseInt(this.getAttribute("data-make"),10)})})
        .then(function(r){
          if(!r.ok){ toast(r.error); return; }
          showCred("Login for flat "+r.flat_no, r.name, r.username, r.password);
          load();
        }).catch(function(e){ toast(e.message); });
      });
    });

    document.querySelectorAll("[data-reset]").forEach(function(b){
      b.addEventListener("click",function(){
        if(!confirm("Issue a new password? The old one stops working.")) return;
        this.disabled=true;
        api("accounts.php",{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"reset",user_id:parseInt(this.getAttribute("data-reset"),10)})})
        .then(function(r){
          if(!r.ok){ toast(r.error); return; }
          showCred("New password", r.name, r.username, r.password);
          load();
        }).catch(function(e){ toast(e.message); });
      });
    });
  }

  function showCred(title,name,user,pass){
    var msg = name+"\nLogin: "+user+"\nPassword: "+pass;
    $("shBody").innerHTML='<h3>'+esc(title)+'</h3>'+
      '<p class="sh-sub">Note this down now. The password is not shown again.</p>'+
      '<div class="cred"><div class="cl">Name</div><div class="cv">'+esc(name)+'</div>'+
      '<div class="cl">Login ID</div><div class="cv">'+esc(user)+'</div>'+
      '<div class="cl">Password</div><div class="cv">'+esc(pass)+'</div></div>'+
      '<button class="copy" id="cp">Copy details</button>'+
      '<button class="go" id="dn">Done</button>';
    veil.classList.add("show");
    $("cp").addEventListener("click",function(){
      var self=this;
      function ok(){ self.textContent="Copied"; setTimeout(function(){self.textContent="Copy details";},1800); }
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(msg).then(ok).catch(fb);
      } else fb();
      function fb(){
        var ta=document.createElement("textarea"); ta.value=msg;
        ta.style.position="fixed"; ta.style.opacity="0";
        document.body.appendChild(ta); ta.select();
        try{ document.execCommand("copy"); ok(); }catch(e){}
        document.body.removeChild(ta);
      }
    });
    $("dn").addEventListener("click",function(){ veil.classList.remove("show"); });
  }

  function showBulk(list){
    var txt=list.map(function(a){ return a.flat_no+"  "+a.username+"  "+a.password+"  ("+a.name+")"; }).join("\n");
    var html=list.map(function(a){
      return esc(a.flat_no)+"  "+esc(a.username)+"  "+esc(a.password);
    }).join("<br>");
    $("shBody").innerHTML='<h3>'+list.length+' logins created</h3>'+
      '<p class="sh-sub">Copy this list now and hand the details to each flat. Passwords are not shown again.</p>'+
      '<div class="list-cred">'+html+'</div>'+
      '<button class="copy" id="cpB">Copy all</button>'+
      '<button class="go" id="dnB">Done</button>';
    veil.classList.add("show");
    $("cpB").addEventListener("click",function(){
      var self=this;
      function ok(){ self.textContent="Copied"; setTimeout(function(){self.textContent="Copy all";},1800); }
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(txt).then(ok).catch(fb);
      } else fb();
      function fb(){
        var ta=document.createElement("textarea"); ta.value=txt;
        ta.style.position="fixed"; ta.style.opacity="0";
        document.body.appendChild(ta); ta.select();
        try{ document.execCommand("copy"); ok(); }catch(e){}
        document.body.removeChild(ta);
      }
    });
    $("dnB").addEventListener("click",function(){ veil.classList.remove("show"); });
  }

  $("tabs").addEventListener("click",function(e){
    var t=e.target.closest(".tb"); if(!t) return;
    this.querySelectorAll(".tb").forEach(function(x){x.classList.remove("on");});
    t.classList.add("on"); view=t.getAttribute("data-v"); render();
  });

  veil.addEventListener("click",function(e){ if(e.target===veil) veil.classList.remove("show"); });
  $("back").addEventListener("click",function(){ location.href="dashboard.html"; });

  /* ---------- QR code, drawn locally with no external service ---------- */
  function drawQr(text){
    var box = document.getElementById("qrBox");
    if(!box) return;
    if(typeof qrcode === "undefined"){
      var s = document.createElement("script");
      s.src = "assets/qrcode.min.js";
      s.onload = function(){ paintQr(box, text); };
      s.onerror = function(){
        box.innerHTML = '<span style="font-size:11.5px;color:#6C7A72;text-align:center;padding:10px;line-height:1.5">Could not draw the code.<br>Use the link below.</span>';
      };
      document.head.appendChild(s);
    } else {
      paintQr(box, text);
    }
  }

  function paintQr(box, text){
    try{
      box.innerHTML = "";
      var qr = qrcode(0, "M");
      qr.addData(text);
      qr.make();
      box.innerHTML = qr.createSvgTag({ cellSize: 4, margin: 0, scalable: true });
      var svg = box.querySelector("svg");
      if(svg){ svg.style.width = "100%"; svg.style.height = "100%"; }
    }catch(e){
      box.innerHTML = '<span style="font-size:11.5px;color:#6C7A72;text-align:center;padding:10px;line-height:1.5">Could not draw the code.<br>Use the link below.</span>';
    }
  }

  load();
})();
</script>
<script src="assets/notify.js"></script>
</body>
</html>
